# =================================================
# 3️⃣ 自动测速分组（已去国家限制）
# =================================================

custom_proxy_group=🤖 OpenAI自动`url-test`.*`https://www.gstatic.com/generate_204`300,,50

custom_proxy_group=✨ Google自动`url-test`.*`https://www.gstatic.com/generate_204`300,,50

custom_proxy_group=📺 YouTube自动`url-test`.*`https://www.gstatic.com/generate_204`300,,80

custom_proxy_group=💠 Microsoft自动`url-test`.*`https://www.msftconnecttest.com/connecttest.txt`300,,50

custom_proxy_group=📨 Telegram自动`url-test`.*`https://www.gstatic.com/generate_204`300,,80

custom_proxy_group=🎬 流媒体自动`url-test`.*`https://www.gstatic.com/generate_204`300,,80

custom_proxy_group=🎵 TikTok自动`url-test`.*`https://www.gstatic.com/generate_204`300,,80



# =================================================
# 4️⃣ 全部节点自动测速
# =================================================

custom_proxy_group=🌐 全部节点自动`url-test`.*`https://www.gstatic.com/generate_204`300,,50



