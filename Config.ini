
# =================================================
# 国内直连
# =================================================

ruleset=DIRECT,[]GEOIP,CN
ruleset=DIRECT,[]GEOIP,LAN

# 微信直连
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/WeChat/WeChat.list


# =================================================
# AI / 应用分流
# =================================================

ruleset=🤖 OpenAI自动,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=✨ Google自动,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
ruleset=📺 YouTube自动,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list
ruleset=💠 Microsoft自动,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.list
ruleset=📨 Telegram自动,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
ruleset=🎬 流媒体自动,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia.list
ruleset=🎵 TikTok自动,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list


# FINAL
ruleset=🌍 兜底自动,[]FINAL



# =================================================
# 国家分组
# =================================================

custom_proxy_group=🇭🇰 香港`select`(?i).*(香港|HK|Hong Kong|🇭🇰).*
custom_proxy_group=🇯🇵 日本`select`(?i).*(日本|JP|Japan|东京|大阪|Tokyo|Osaka|🇯🇵).*
custom_proxy_group=🇸🇬 新加坡`select`(?i).*(新加坡|SG|Singapore|🇸🇬).*
custom_proxy_group=🇺🇸 美国`select`(?i).*(美国|美國|US|USA|United States|🇺🇸).*
custom_proxy_group=🇹🇼 台湾`select`(?i).*(台湾|台灣|TW|Taiwan|🇹🇼).*
custom_proxy_group=🇻🇳 越南`select`(?i).*(越南|VN|Vietnam|🇻🇳).*
custom_proxy_group=🇪🇺 欧洲`select`(?i).*(Germany|France|UK|Netherlands|🇩🇪|🇫🇷|🇬🇧|🇳🇱).*
custom_proxy_group=🌍 其它地区`select`.*



# =================================================
# 自动测速组
# =================================================

custom_proxy_group=🤖 OpenAI自动`url-test`[]🇺🇸 美国[]🇯🇵 日本`https://chat.openai.com`300,,50

custom_proxy_group=✨ Google自动`url-test`[]🇭🇰 香港[]🇯🇵 日本[]🇸🇬 新加坡[]🇹🇼 台湾`https://www.google.com/generate_204`300,,50

custom_proxy_group=📺 YouTube自动`url-test`[]🇯🇵 日本[]🇸🇬 新加坡[]🇭🇰 香港`https://www.youtube.com/generate_204`300,,80

custom_proxy_group=💠 Microsoft自动`url-test`[]🇭🇰 香港[]🇯🇵 日本[]🇸🇬 新加坡[]🇺🇸 美国`https://www.msftconnecttest.com/connecttest.txt`300,,50

custom_proxy_group=📨 Telegram自动`url-test`[]🇭🇰 香港[]🇸🇬 新加坡[]🇯🇵 日本`https://telegram.org`300,,80

custom_proxy_group=🎬 流媒体自动`url-test`[]🇯🇵 日本[]🇸🇬 新加坡[]🇺🇸 美国`https://www.netflix.com/title/70143836`300,,80

custom_proxy_group=🎵 TikTok自动`url-test`[]🇯🇵 日本[]🇸🇬 新加坡[]🇻🇳 越南[]🇺🇸 美国`https://www.tiktok.com`300,,80



# =================================================
# 全部节点测速
# =================================================

custom_proxy_group=🌐 全部节点自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50



# =================================================
# FINAL 兜底
# =================================================

custom_proxy_group=🌍 兜底自动`url-test`[]🇭🇰 香港[]🇯🇵 日本[]🇸🇬 新加坡[]🇺🇸 美国`http://www.gstatic.com/generate_204`300,,50



# =================================================
# 手动选择（修正版）
# =================================================

custom_proxy_group=🎯 手动选择`select`[]🌍 兜底自动[]🌐 全部节点自动[]🇭🇰 香港[]🇯🇵 日本[]🇸🇬 新加坡[]🇺🇸 美国[]🇹🇼 台湾[]🇻🇳 越南[]🇪🇺 欧洲[]🌍 其它地区`.*



# =================================================
# 基础设置
# =================================================

enable_rule_generator=true
overwrite_original_rules=true
